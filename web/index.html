<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Python HTML GUI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Mandatory link to tie Eel backend logic to the web page -->
    <script type="text/javascript" src="/eel.js"></script>
</head>
<body>
    <div class="container">
        <h2>Convert High Resolution Images Down to Web-Ready Size</h2>
        <input type="text" id="userInput" placeholder="Type something...">
        <button onclick="sendToPython()">Submit</button>
        <p id="response"></p>
    </div>

    <script>
        async function sendToPython() {
            let input = document.getElementById("userInput").value;
            // Call the exposed Python function asynchronously
            let result = await eel.process_data(input)();
            document.getElementById("response").innerText = result;
        }
    </script>
</body>
</html>
